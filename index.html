<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Summer Camp 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Barlow+Semi+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --mint: #c7fae9; --navy: #1800ad; --yellow: #ffde59; --red: #ff4d4d; --white: #ffffff; --purple: #6d1ed4; }
        
        body { 
            font-family: 'Barlow Semi Condensed', sans-serif; 
            margin: 0; 
            color: var(--navy); 
            background: var(--mint);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Animated Wavy Background */
        .ocean { height: 5%; width: 100%; position: absolute; bottom: 0; left: 0; background: #015871; }
        
        header { 
            background: linear-gradient(135deg, var(--yellow) 0%, #ffc107 100%);
            padding: 80px 20px; 
            text-align: center; 
            border-bottom: 10px solid var(--navy);
            position: relative;
        }

        h1 { 
            font-family: 'Bungee Shade', cursive; 
            font-size: clamp(2.5rem, 10vw, 5rem); 
            margin: 0; 
            color: var(--navy); 
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        nav { 
            background: var(--navy); 
            padding: 15px; 
            position: sticky; 
            top: 0; 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            z-index: 1000;
            border-bottom: 4px solid var(--red);
        }

        nav a { color: white; text-decoration: none; font-family: 'Bungee', cursive; font-size: 0.9rem; letter-spacing: 1px; }
        nav a:hover { color: var(--mint); }

        section { padding: 50px 20px; max-width: 850px; margin: auto; }

        .card { 
            background: var(--white); 
            padding: 40px; 
            border-radius: 40px; 
            border: 5px solid var(--navy); 
            box-shadow: 20px 20px 0px var(--navy); 
            margin-bottom: 50px;
            transform: rotate(0.5deg);
        }

        h2 { font-family: 'Bungee', cursive; color: var(--red); font-size: 2rem; margin-top: 0; }

        .price-tag { 
            background: var(--navy); 
            color: white; 
            padding: 15px 30px; 
            border-radius: 100px; 
            display: inline-block; 
            font-family: 'Bungee', cursive;
            margin: 20px 0;
            font-size: 1.5rem;
        }

        .promo-box { 
            background: var(--red); 
            color: white; 
            padding: 30px; 
            border-radius: 30px; 
            text-align: center; 
            border: 5px solid var(--navy);
            transform: rotate(-1deg);
        }

        .btn { 
            display: block; 
            background: var(--purple); 
            color: white; 
            text-align: center; 
            padding: 25px; 
            text-decoration: none; 
            border-radius: 100px; 
            font-family: 'Bungee', cursive;
            font-size: 1.6rem; 
            margin-top: 30px; 
            border: 5px solid var(--navy);
            box-shadow: 0px 8px 0px #4a148c;
            transition: 0.2s;
        }

        .btn:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0px 12px 0px #4a148c; }
